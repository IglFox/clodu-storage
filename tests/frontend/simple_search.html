<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=yes"
        />
        <title>Clode Storage · Умный поиск</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --bg: #0c0f14;
                --bg-card: #13161d;
                --bg-card-hover: #181c25;
                --bg-surface: #1a1e28;
                --border: #242a36;
                --border-subtle: #1e2330;
                --text: #e8eaf0;
                --text-muted: #8b93a7;
                --text-faint: #5c6478;
                --accent: #3b82f6;
                --accent-dim: rgba(59, 130, 246, 0.12);
                --accent-green: #22c55e;
                --accent-red: #ef4444;
                --accent-amber: #f59e0b;
                --radius: 14px;
                --radius-sm: 10px;
                --font-body: "Inter", system-ui, -apple-system, sans-serif;
                --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.2);
            }

            .light {
                --bg: #f4f5f7;
                --bg-card: #ffffff;
                --bg-card-hover: #f9fafb;
                --bg-surface: #f0f1f4;
                --border: #d8dbe3;
                --border-subtle: #e4e7ed;
                --text: #111827;
                --text-muted: #4b5563;
                --text-faint: #6b7280;
                --accent: #2563eb;
                --accent-dim: rgba(37, 99, 235, 0.08);
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            }

            body {
                font-family: var(--font-body);
                background: var(--bg);
                color: var(--text);
                transition:
                    background 0.2s,
                    color 0.2s;
                padding: 1rem;
            }

            .app {
                max-width: 1280px;
                margin: 0 auto;
            }

            /* header / навигация */
            .nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 1rem;
                margin-bottom: 2rem;
                padding-bottom: 0.75rem;
                border-bottom: 1px solid var(--border-subtle);
            }
            .logo {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-weight: 700;
                font-size: 1.25rem;
            }
            .logo svg {
                width: 28px;
                height: 28px;
                stroke: currentColor;
            }
            .theme-btn {
                background: var(--bg-surface);
                border: 1px solid var(--border);
                padding: 0.4rem 0.9rem;
                border-radius: 40px;
                cursor: pointer;
                font-size: 0.8rem;
                color: var(--text-muted);
                transition: 0.2s;
            }
            .theme-btn:hover {
                border-color: var(--text-faint);
                color: var(--text);
            }

            /* KPI карточки */
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 1rem;
                margin-bottom: 2rem;
            }
            .kpi-card {
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius);
                padding: 1.2rem;
                transition: 0.15s;
                box-shadow: var(--shadow-sm);
            }
            .kpi-label {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--text-muted);
                margin-bottom: 0.3rem;
            }
            .kpi-value {
                font-size: 2rem;
                font-weight: 700;
                line-height: 1.2;
            }
            .kpi-unit {
                font-size: 0.8rem;
                color: var(--text-faint);
                font-weight: 400;
            }
            .progress-bar {
                margin-top: 0.6rem;
                height: 5px;
                background: var(--border);
                border-radius: 10px;
                overflow: hidden;
            }
            .progress-fill {
                width: 0%;
                height: 100%;
                background: var(--accent);
            }

            /* поисковая панель (RAG-стиль) */
            .search-section {
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius);
                padding: 1.2rem;
                margin-bottom: 2rem;
                box-shadow: var(--shadow-sm);
            }
            .search-header {
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
                margin-bottom: 0.75rem;
            }
            .search-input-wrapper {
                flex: 1;
                position: relative;
            }
            .search-input {
                width: 100%;
                padding: 0.8rem 1rem;
                background: var(--bg-surface);
                border: 1px solid var(--border);
                border-radius: 48px;
                font-size: 0.95rem;
                color: var(--text);
                outline: none;
                transition: 0.2s;
            }
            .search-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 2px var(--accent-dim);
            }
            .search-btn {
                background: var(--accent);
                border: none;
                padding: 0 1.4rem;
                border-radius: 48px;
                font-weight: 600;
                color: white;
                cursor: pointer;
                transition: 0.2s;
            }
            .search-btn:hover {
                opacity: 0.9;
            }
            .search-hint {
                font-size: 0.7rem;
                color: var(--text-faint);
                margin-top: 0.5rem;
                display: flex;
                gap: 0.5rem;
                align-items: center;
                flex-wrap: wrap;
            }
            .badge {
                background: var(--accent-dim);
                padding: 0.2rem 0.5rem;
                border-radius: 30px;
                font-size: 0.7rem;
                color: var(--accent);
            }

            /* сетка результатов / файлов */
            .results-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin: 1rem 0 1rem 0;
            }
            .results-count {
                font-size: 0.8rem;
                color: var(--text-muted);
            }
            .file-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1rem;
            }
            .file-card {
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-sm);
                padding: 1rem;
                display: flex;
                align-items: center;
                gap: 0.9rem;
                transition: 0.2s;
                cursor: pointer;
                box-shadow: var(--shadow-sm);
            }
            .file-card:hover {
                background: var(--bg-card-hover);
                transform: translateY(-2px);
                border-color: var(--border);
            }
            .file-icon {
                font-size: 2rem;
            }
            .file-info {
                flex: 1;
            }
            .file-name {
                font-weight: 600;
                margin-bottom: 0.2rem;
                display: flex;
                align-items: center;
                gap: 0.3rem;
                flex-wrap: wrap;
            }
            .match-highlight {
                background: var(--accent-amber);
                color: #1a1a1a;
                padding: 0 0.2rem;
                border-radius: 4px;
                font-weight: 600;
            }
            .file-meta {
                font-size: 0.7rem;
                color: var(--text-faint);
                display: flex;
                gap: 0.8rem;
                margin-top: 0.2rem;
            }
            .file-path {
                font-size: 0.65rem;
                font-family: monospace;
                color: var(--text-muted);
                background: var(--bg-surface);
                display: inline-block;
                padding: 0.1rem 0.4rem;
                border-radius: 12px;
            }
            .empty-state {
                text-align: center;
                padding: 3rem;
                background: var(--bg-card);
                border-radius: var(--radius);
                color: var(--text-faint);
            }
            footer {
                margin-top: 3rem;
                text-align: center;
                font-size: 0.7rem;
                color: var(--text-faint);
                border-top: 1px solid var(--border-subtle);
                padding-top: 1.5rem;
            }

            @media (max-width: 640px) {
                .file-grid {
                    grid-template-columns: 1fr;
                }
                .search-header {
                    flex-direction: column;
                }
                .search-btn {
                    padding: 0.7rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <!-- Шапка -->
            <div class="nav">
                <div class="logo">
                    <svg
                        viewBox="0 0 28 28"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.6"
                    >
                        <rect x="3" y="3" width="22" height="22" rx="5" />
                        <path d="M8 12h12M8 16h8" stroke-linecap="round" />
                        <circle
                            cx="19"
                            cy="16"
                            r="1.5"
                            fill="currentColor"
                            stroke="none"
                        />
                    </svg>
                    <span>Clode Storage · RAG поиск</span>
                </div>
                <button class="theme-btn" id="themeToggle">🌙 Тёмная</button>
            </div>

            <!-- KPI: всего файлов, папок, использовано -->
            <div class="kpi-grid" id="kpiContainer"></div>

            <!-- Поисковая зона (RAG-ориентир) -->
            <div class="search-section">
                <div class="search-header">
                    <div class="search-input-wrapper">
                        <input
                            type="text"
                            id="searchInput"
                            class="search-input"
                            placeholder="Найти файлы и папки... (поиск по имени, расширению, содержимому)"
                            autocomplete="off"
                        />
                    </div>
                    <button id="searchBtn" class="search-btn">🔍 Найти</button>
                </div>
                <div class="search-hint">
                    <span
                        >⚡ RAG‑подсказка: ищем по названиям, тегам и короткому
                        содержимому (.txt, .md, .pdf-мета).</span
                    >
                    <span class="badge">интеллектуальный поиск</span>
                </div>
            </div>

            <!-- Результаты / Список файлов -->
            <div class="results-header">
                <h2 style="font-size: 1.1rem">📂 Файлы и папки</h2>
                <div class="results-count" id="resultCount"></div>
            </div>
            <div id="fileGrid" class="file-grid"></div>

            <footer>
                <span
                    >Демонстрация RAG-подхода: поиск по имени, расширению,
                    содержимому (документы .txt, .md, .pdf-заглушки).</span
                >
            </footer>
        </div>

        <script>
            // -------------------- МОКОВЫЕ ДАННЫЕ С МЕТАДАННЫМИ ДЛЯ RAG-ПОИСКА --------------------
            // Структура: id, name, type (file/folder), parentId, size, modified, contentPreview (для текстовых файлов), tags (симуляция)
            let files = [
                {
                    id: "root",
                    name: "root",
                    type: "folder",
                    parentId: null,
                    size: 0,
                    modified: Date.now() - 86400000,
                    contentPreview: "",
                    tags: [],
                },
                {
                    id: "f1",
                    name: "Документы",
                    type: "folder",
                    parentId: "root",
                    size: 0,
                    modified: Date.now() - 172800000,
                    contentPreview: "",
                    tags: ["работа", "офис"],
                },
                {
                    id: "f2",
                    name: "Проекты",
                    type: "folder",
                    parentId: "root",
                    size: 0,
                    modified: Date.now() - 259200000,
                    contentPreview: "",
                    tags: ["разработка", "архив"],
                },
                {
                    id: "f3",
                    name: "Личное",
                    type: "folder",
                    parentId: "root",
                    size: 0,
                    modified: Date.now() - 345600000,
                    contentPreview: "",
                    tags: ["фото", "семья"],
                },
                // файлы с контентом для RAG-поиска
                {
                    id: "file1",
                    name: "отчет_2025.pdf",
                    type: "file",
                    parentId: "f1",
                    size: 2.4 * 1024 * 1024,
                    modified: Date.now() - 500000,
                    contentPreview:
                        "финансовые показатели, прибыль выросла на 15%",
                    tags: ["финансы", "отчет"],
                },
                {
                    id: "file2",
                    name: "техническое задание.md",
                    type: "file",
                    parentId: "f2",
                    size: 85 * 1024,
                    modified: Date.now() - 1200000,
                    contentPreview:
                        "Разработать облачное хранилище с шифрованием. Архитектура: FastAPI + Vue.",
                    tags: ["техническая документация", "бэкенд"],
                },
                {
                    id: "file3",
                    name: "фото_отпуск.jpg",
                    type: "file",
                    parentId: "f3",
                    size: 3.8 * 1024 * 1024,
                    modified: Date.now() - 2000000,
                    contentPreview: "пляж, море, закат",
                    tags: ["изображение", "лето"],
                },
                {
                    id: "file4",
                    name: "инструкция.txt",
                    type: "file",
                    parentId: "root",
                    size: 12 * 1024,
                    modified: Date.now() - 800000,
                    contentPreview:
                        "Как пользоваться облаком: загружайте файлы, используйте поиск по ключевым словам.",
                    tags: ["инструкция", "справка"],
                },
                {
                    id: "file5",
                    name: "бюджет.xlsx",
                    type: "file",
                    parentId: "f1",
                    size: 210 * 1024,
                    modified: Date.now() - 3000000,
                    contentPreview: "бюджет на маркетинг, итого 500k руб",
                    tags: ["excel", "финансы"],
                },
                {
                    id: "file6",
                    name: "архив_кода.zip",
                    type: "file",
                    parentId: "f2",
                    size: 15.2 * 1024 * 1024,
                    modified: Date.now() - 4200000,
                    contentPreview: "исходники старого проекта на Python",
                    tags: ["архив", "код"],
                },
                {
                    id: "file7",
                    name: "презентация_продукта.pptx",
                    type: "file",
                    parentId: "root",
                    size: 4.1 * 1024 * 1024,
                    modified: Date.now() - 1500000,
                    contentPreview: "новые функции облака, дорожная карта 2026",
                    tags: ["презентация", "маркетинг"],
                },
            ];

            // построение путей для breadcrumb (только для отображения)
            function getFilePath(itemId) {
                let path = [];
                let cur = files.find((f) => f.id === itemId);
                while (cur && cur.id !== "root") {
                    path.unshift(cur.name);
                    cur = files.find((f) => f.id === cur.parentId);
                }
                return path.join(" / ") || "Корень";
            }

            // ---- утилиты ----
            function formatSize(bytes) {
                if (bytes === 0) return "0 B";
                const k = 1024;
                const sizes = ["B", "KB", "MB", "GB"];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return (bytes / Math.pow(k, i)).toFixed(1) + " " + sizes[i];
            }

            function getFileIcon(name, type) {
                if (type === "folder") return "📁";
                const ext = name.split(".").pop().toLowerCase();
                if (["jpg", "jpeg", "png", "gif", "webp"].includes(ext))
                    return "🖼️";
                if (["mp4", "mkv", "mov"].includes(ext)) return "🎬";
                if (["mp3", "wav", "flac"].includes(ext)) return "🎵";
                if (["pdf"].includes(ext)) return "📑";
                if (["doc", "docx", "txt", "md"].includes(ext)) return "📄";
                if (["xlsx", "xls", "csv"].includes(ext)) return "📊";
                if (["zip", "rar", "7z", "tar"].includes(ext)) return "🗜️";
                if (["pptx", "ppt"].includes(ext)) return "📽️";
                return "📎";
            }

            // --- RAG-поиск (полнотекстовый по имени, тегам, содержимому, расширению) ---
            function searchFilesAndFolders(query) {
                if (!query.trim()) {
                    // если пустой запрос – показать все файлы и папки (кроме root)
                    return files
                        .filter((f) => f.id !== "root")
                        .sort((a, b) => b.modified - a.modified);
                }
                const lowerQuery = query.toLowerCase().trim();

                return files
                    .filter((item) => {
                        if (item.id === "root") return false;
                        // поиск по имени
                        const nameMatch = item.name
                            .toLowerCase()
                            .includes(lowerQuery);
                        // поиск по расширению (например, .pdf)
                        const extMatch =
                            item.type === "file" &&
                            item.name
                                .split(".")
                                .pop()
                                .toLowerCase()
                                .includes(lowerQuery);
                        // поиск по содержимому (contentPreview)
                        const contentMatch =
                            item.contentPreview &&
                            item.contentPreview
                                .toLowerCase()
                                .includes(lowerQuery);
                        // поиск по тегам
                        const tagsMatch =
                            item.tags &&
                            item.tags.some((tag) =>
                                tag.toLowerCase().includes(lowerQuery),
                            );
                        // родительская папка? для более глубокого поиска можно добавить, но для чистоты ограничимся
                        return (
                            nameMatch || extMatch || contentMatch || tagsMatch
                        );
                    })
                    .sort((a, b) => {
                        // релевантность: выше те, у которых есть точное совпадение в имени
                        const aNameExact = a.name
                            .toLowerCase()
                            .includes(lowerQuery)
                            ? 1
                            : 0;
                        const bNameExact = b.name
                            .toLowerCase()
                            .includes(lowerQuery)
                            ? 1
                            : 0;
                        if (aNameExact !== bNameExact)
                            return bNameExact - aNameExact;
                        return b.modified - a.modified;
                    });
            }

            // подсветка совпадений (для имени)
            function highlightMatch(text, query) {
                if (!query.trim()) return text;
                const regex = new RegExp(`(${escapeRegex(query)})`, "gi");
                return text.replace(
                    regex,
                    `<span class="match-highlight">$1</span>`,
                );
            }
            function escapeRegex(str) {
                return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            // --- Отрисовка KPI (общая статистика по всем данным) ---
            function renderKPI() {
                const totalFiles = files.filter(
                    (f) => f.type === "file",
                ).length;
                const totalFolders = files.filter(
                    (f) => f.type === "folder" && f.id !== "root",
                ).length;
                const usedBytes = files
                    .filter((f) => f.type === "file")
                    .reduce((sum, f) => sum + f.size, 0);
                const usedGB = (usedBytes / 1024 ** 3).toFixed(2);
                const totalSpaceGB = 10;
                const percent = (usedBytes / 1024 ** 3 / totalSpaceGB) * 100;
                document.getElementById("kpiContainer").innerHTML = `
            <div class="kpi-card"><div class="kpi-label">Всего файлов</div><div class="kpi-value">${totalFiles}</div></div>
            <div class="kpi-card"><div class="kpi-label">Количество папок</div><div class="kpi-value">${totalFolders}</div></div>
            <div class="kpi-card"><div class="kpi-label">Использовано</div><div class="kpi-value">${usedGB}<span class="kpi-unit">GB</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div><div class="kpi-sub">из 10 GB</div></div>
        `;
            }

            // отрисовка результатов поиска (сетка файлов/папок)
            function renderResults(items, searchQueryText) {
                const container = document.getElementById("fileGrid");
                const resultCountSpan = document.getElementById("resultCount");
                if (!items.length) {
                    container.innerHTML = `<div class="empty-state">📭 Ничего не найдено. Попробуйте изменить запрос или загрузите файлы с метаданными.</div>`;
                    resultCountSpan.innerText = "0 результатов";
                    return;
                }
                resultCountSpan.innerText = `${items.length} ${declension(items.length, "результат", "результата", "результатов")}`;
                container.innerHTML = items
                    .map((item) => {
                        const displayName = searchQueryText
                            ? highlightMatch(item.name, searchQueryText)
                            : item.name;
                        const path = getFilePath(item.id);
                        let metaLine = "";
                        if (item.type === "file") {
                            metaLine = `${formatSize(item.size)} • ${new Date(item.modified).toLocaleDateString()}`;
                        } else {
                            metaLine = `папка • ${new Date(item.modified).toLocaleDateString()}`;
                        }
                        // отображение дополнительной информации о совпадении (для RAG-опыта)
                        let ragHint = "";
                        if (
                            searchQueryText &&
                            item.contentPreview &&
                            item.contentPreview
                                .toLowerCase()
                                .includes(searchQueryText.toLowerCase())
                        ) {
                            ragHint = `<span class="badge" style="background:var(--accent-dim);">📄 совпадение в содержимом</span>`;
                        } else if (
                            searchQueryText &&
                            item.tags &&
                            item.tags.some((t) =>
                                t
                                    .toLowerCase()
                                    .includes(searchQueryText.toLowerCase()),
                            )
                        ) {
                            ragHint = `<span class="badge" style="background:var(--accent-dim);">🏷️ совпадение по тегу</span>`;
                        }
                        return `
                <div class="file-card" data-id="${item.id}" data-type="${item.type}">
                    <div class="file-icon">${getFileIcon(item.name, item.type)}</div>
                    <div class="file-info">
                        <div class="file-name">${displayName} ${ragHint}</div>
                        <div class="file-meta">
                            <span>${metaLine}</span>
                            <span class="file-path">${path}</span>
                        </div>
                    </div>
                </div>
            `;
                    })
                    .join("");
                // обработчики кликов (открыть папку или предпросмотр)
                document.querySelectorAll(".file-card").forEach((card) => {
                    card.addEventListener("click", (e) => {
                        const id = card.dataset.id;
                        const item = files.find((f) => f.id === id);
                        if (item.type === "folder") {
                            alert(
                                `📂 Папка: ${item.name}\nПуть: ${getFilePath(id)}\nВ демо-режиме навигация не переключается, но при реальной интеграции вы перейдёте внутрь.`,
                            );
                        } else {
                            let info = `Файл: ${item.name}\nРазмер: ${formatSize(item.size)}\nРасположение: ${getFilePath(id)}`;
                            if (item.contentPreview)
                                info += `\n📝 Содержимое (превью): ${item.contentPreview.substring(0, 120)}${item.contentPreview.length > 120 ? "…" : ""}`;
                            alert(info);
                        }
                    });
                });
            }

            function declension(n, one, two, five) {
                n = Math.abs(n) % 100;
                if (n >= 5 && n <= 20) return five;
                n %= 10;
                if (n === 1) return one;
                if (n >= 2 && n <= 4) return two;
                return five;
            }

            // --- глобальный поиск (обновление UI) ---
            let currentQuery = "";

            function performSearch() {
                const input = document.getElementById("searchInput");
                const query = input.value;
                currentQuery = query;
                const results = searchFilesAndFolders(query);
                renderResults(results, query);
            }

            // --- тема (light/dark) ---
            function initTheme() {
                const isLight = localStorage.getItem("theme") === "light";
                if (isLight) document.documentElement.classList.add("light");
                const btn = document.getElementById("themeToggle");
                btn.innerHTML = isLight ? "☀️ Светлая" : "🌙 Тёмная";
                btn.addEventListener("click", () => {
                    document.documentElement.classList.toggle("light");
                    const nowLight =
                        document.documentElement.classList.contains("light");
                    localStorage.setItem("theme", nowLight ? "light" : "dark");
                    btn.innerHTML = nowLight ? "☀️ Светлая" : "🌙 Тёмная";
                });
            }

            // --- добавим возможность загрузки новых файлов (симуляция RAG-индексации) ---
            function setupDemoActions() {
                // кнопки загрузки нет в UI, но можно через консоль добавить, либо просто оставить демо-данные
                // для интерактива: имитируем добавление файла через drag&drop? не обязательно.
                // добавим скрытую возможность: при вводе спецкоманды "add demo pdf" - но без усложнения.
                // Также поиск реагирует на кнопку и на Enter
                const searchBtn = document.getElementById("searchBtn");
                const searchInput = document.getElementById("searchInput");
                searchBtn.addEventListener("click", performSearch);
                searchInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") performSearch();
                });
            }

            // инициализация: стартовый рендер всех файлов (без поиска)
            function init() {
                renderKPI();
                // по умолчанию показываем все элементы (кроме root)
                const allItems = files
                    .filter((f) => f.id !== "root")
                    .sort((a, b) => b.modified - a.modified);
                renderResults(allItems, "");
                setupDemoActions();
                initTheme();
            }

            init();
        </script>
    </body>
</html>
