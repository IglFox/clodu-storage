services:
  postgres:
    image: postgres:17-alpine
    container_name: clodu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clodu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  storage:
    build:
      context: .
      dockerfile: backend/Clodu.API/Dockerfile
    container_name: clodu_storage
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=clodu;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - storage_data:/app/Storage
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: clodu_gateway
    environment:
      - AUTH_SERVICE_URL=http://clodu_storage:8080
      - ANALYSIS_SERVICE_URL=http://localhost:8003
      - ENCRYPT_SERVICE_URL=http://localhost:8004
      - STORAGE_SERVICE_URL=http://clodu_storage:8080
      - JWT_SECRET_KEY=clodu-super-secret-key-2024-very-long-and-secure-32bytes
      - JWT_ALGORITHM=HS256
    depends_on:
      - storage
    ports:
      - "8000:8000"
    networks:
      - backend
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
    container_name: clodu_ui
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      - gateway

volumes:
  postgres_data:
  storage_data:

networks:
  backend:
    driver: bridge
