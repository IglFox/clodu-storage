services:
  postgres:
    image: postgres:17-alpine
    container_name: clodu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clodu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  storage:
    build:
      context: .
      dockerfile: backend/Clodu.API/Dockerfile
    container_name: clodu_storage
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=clodu;Username=postgres;Password=postgres
    ports:
      - "5019:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  ui:
    build: ./frontend
    container_name: clodu_ui
    ports:
      - "5173:5173"
    environment:
      VITE_AUTH_API_URL: http://localhost:5019 # или http://storage:8080, если через gateway
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
