services:
  auth:
    build: ./backend
    container_name: auth
    ports:
      - "8001:8000"
    environment:
      - ROUTER_NAME=main_auth
    depends_on:
      - db

  storage:
    build: ./backend
    container_name: storage
    ports:
      - "8002:8000"
    environment:
      - ROUTER_NAME=main_storage
    depends_on:
      - db
    volumes:
      - files-data:/data/files # общий диск для файлов

  data-analysis:
    build: ./frontend
    container_name: data-analysis
    ports:
      - "8003:8000"
    environment:
      - ROUTER_NAME=main_data_analysis
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: cloud_user
      POSTGRES_PASSWORD: cloud_pass
      POSTGRES_DB: cloud_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  main_page:
    image: dockerfile-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile-ui
    container_name: streamlit_page
    ports:
      - "8004:8501"
    depends_on:
      - db

volumes:
  db-data:
  files-data:
