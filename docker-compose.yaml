services:
  auth:
    build: ./backend
    container_name: auth
    ports:
      - "8001:8000"
    environment:
      - ROUTER_NAME=main_auth
    depends_on:
      - db

  storage:
    build: ./backend
    container_name: storage
    ports:
      - "8002:8000"
    environment:
      - ROUTER_NAME=main_storage
    depends_on:
      - db
    volumes:
      - files-data:/data/files # общий диск для файлов

  encrypt:
    build: ./backend
    container_name: encrypt
    ports:
      - "8005:8000"
    environment:
      - ROUTER_NAME=main_encryption
    depends_on:
      - db
    volumes:
      - files-data:/data/files # общий диск для файлов

  streamlit:
    build: ./frontend
    container_name: streamlit
    ports:
      - "8004:8501"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: cloud_user
      POSTGRES_PASSWORD: cloud_pass
      POSTGRES_DB: cloud_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  files-data:
