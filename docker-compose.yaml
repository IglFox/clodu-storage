version: "3.8"

services:
  auth:
    build:
      context: ./backend/auth
      args:
        SERVICE_NAME: auth
    networks:
      - backend

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      AUTH_URL: "http://auth:8081"
      STORAGE_URL: "http://storage:8002"
      ANALYSIS_URL: "http://analysis:8003"
      ENCRYPT_URL: "http://encrypt:8004"
    networks:
      - backend
    depends_on:
      - auth
      - storage

  ui:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - backend
    depends_on:
      - gateway

  storage:
    build: ./backend/storage
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:password@db:5432/filestorage"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      STORAGE_DIR: "/data/files"
    volumes:
      - file_storage:/data/files
    networks:
      - backend
    depends_on:
      - db
      - elasticsearch
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: filestorage
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - backend
    volumes:
      - esdata:/usr/share/elasticsearch/data

networks:
  backend:
    driver: bridge

volumes:
  file_storage:
  pgdata:
  esdata:
